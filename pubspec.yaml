name: eduflow
description: A modern Flutter educational app integrated with Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — v3 BoM-compatible versions (stable, work with Dart SDK 3.x)
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1

  # State Management
  provider: ^6.1.2

  # UI / Fonts / Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

  # Utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  percent_indicator: ^4.2.3
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
