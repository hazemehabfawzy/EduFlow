name: eduflow
description: A modern Flutter educational app integrated with Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_storage: ^11.7.4
  firebase_messaging: ^14.7.10

  # State Management
  provider: ^6.1.2

  # UI / Fonts / Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0

  # Utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  percent_indicator: ^4.2.3
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  shimmer: ^3.0.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
