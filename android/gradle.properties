org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
android.newDsl=true
android.builtInKotlin=true

# Suppress Java deprecation warnings from third-party plugins
# These come from Firebase/GMS dependencies, not your code
android.suppressUnsupportedCompileSdk=35
org.gradle.warning.mode=none
